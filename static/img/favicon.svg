  <style>
    .aint-flame {
      transform-box: fill-box;
      transform-origin: 50% 100%;
      animation: aint-flame-flicker 2.6s ease-in-out infinite;
    }
    @keyframes aint-flame-flicker {
      0%, 100% { fill: #0e59a9; opacity: 0.9; transform: scale(1, 1); }
      22% { fill: #2f82de; opacity: 1; transform: scale(0.97, 1.05); }
      48% { fill: #5ea4ef; opacity: 0.82; transform: scale(1.03, 0.95); }
      74% { fill: #1770d4; opacity: 1; transform: scale(0.98, 1.04); }
    }
    @media (prefers-reduced-motion: reduce) {
      .aint-flame { animation: none; }
    }
  </style>
